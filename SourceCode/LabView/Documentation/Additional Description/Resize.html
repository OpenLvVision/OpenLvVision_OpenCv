<p>The function <code>resize</code> resizes the image <code>src</code> to the specified size.</p>

<p>
Note that the initial <code>dst</code> type or size are not taken into account.  
Instead, the output size and type are derived from <code>src</code>, <code>dsize</code>, <code>fx</code>, and <code>fy</code>.
</p>
